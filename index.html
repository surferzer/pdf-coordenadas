<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PDF Coordenadas de Firma</title>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; }
  header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 15px; font-weight: 600; color: #1a1a1a; }
  header span { font-size: 11px; color: #888; background: #f0f0f0; padding: 2px 8px; border-radius: 20px; }
  .wt-badge { font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 20px; margin-left: auto; background: #e8f5e9; color: #2e7d32; }
  .main { display: grid; grid-template-columns: 1fr 340px; gap: 0; height: calc(100vh - 49px); }
  .pdf-area { background: #e8e8e8; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 24px; gap: 16px; }
  .upload-zone { width: 100%; max-width: 600px; border: 2px dashed #ccc; border-radius: 12px; padding: 48px 24px; text-align: center; background: #fff; cursor: pointer; transition: border-color 0.2s; }
  .upload-zone:hover { border-color: #4f7ef8; }
  .upload-zone p { font-size: 15px; color: #555; margin-top: 8px; }
  .upload-zone small { font-size: 12px; color: #aaa; }
  .upload-icon { width: 48px; height: 48px; margin: 0 auto 12px; background: #eef2ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .canvas-wrap { position: relative; cursor: crosshair; display: inline-block; line-height: 0; }
  .canvas-wrap canvas { display: block; }
  .marker { position: absolute; width: 28px; height: 28px; transform: translate(-50%, -100%); pointer-events: none; }
  .marker-label { position: absolute; font-size: 11px; font-weight: 600; color: #fff; background: #e6ac00; border-radius: 4px; padding: 1px 5px; transform: translate(-50%, -130%); white-space: nowrap; pointer-events: none; }
  .page-controls { display: flex; align-items: center; gap: 12px; background: #fff; border-radius: 8px; padding: 8px 16px; font-size: 14px; color: #555; }
  .page-controls button { border: 1px solid #e0e0e0; background: #fff; border-radius: 6px; width: 32px; height: 32px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .page-controls button:hover:not(:disabled) { background: #f0f0f0; }
  .page-controls button:disabled { opacity: 0.3; cursor: default; }
  .sidebar { background: #fff; border-left: 1px solid #e0e0e0; display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; font-size: 13px; font-weight: 600; color: #333; display: flex; justify-content: space-between; align-items: center; }
  .sig-count { background: #eef2ff; color: #4f7ef8; border-radius: 20px; padding: 2px 8px; font-size: 12px; }
  .wt-info { padding: 7px 14px; border-bottom: 1px solid #f0f0f0; background: #f0faf1; display: flex; align-items: center; gap: 6px; font-size: 11px; color: #388e3c; }
  .sig-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
  .sig-item { border: 1px solid #e8e8e8; border-radius: 8px; padding: 8px 10px; background: #fafafa; display: flex; align-items: flex-start; gap: 8px; }
  .sig-num { width: 20px; height: 20px; background: #4f7ef8; color: #fff; border-radius: 50%; font-size: 10px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
  .sig-data { flex: 1; }
  .sig-data .sig-name { font-size: 12px; font-weight: 600; color: #1a1a1a; margin-bottom: 1px; }
  .sig-data .sig-coords { font-size: 10px; color: #888; font-family: monospace; }
  .sig-data .sig-meta { font-size: 10px; color: #aaa; margin-top: 2px; }
  .sig-del { background: none; border: none; cursor: pointer; color: #ccc; font-size: 16px; line-height: 1; padding: 0; }
  .sig-del:hover { color: #e74c3c; }
  .empty-state { text-align: center; padding: 24px 16px; color: #aaa; font-size: 12px; }
  .config-panel { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; display: flex; flex-direction: column; gap: 8px; }
  .config-row { display: flex; gap: 8px; align-items: center; }
  .config-row label { font-size: 11px; color: #888; white-space: nowrap; min-width: 70px; }
  select { border: 1px solid #e0e0e0; border-radius: 6px; padding: 5px 8px; font-size: 12px; width: 100%; outline: none; background: #fff; }
  select:focus { border-color: #4f7ef8; }
  .check-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #555; }
  .check-row input[type="checkbox"] { width: 14px; height: 14px; cursor: pointer; }
  .sidebar-footer { padding: 12px 14px; border-top: 1px solid #f0f0f0; display: flex; flex-direction: column; gap: 6px; }
  .json-tabs { display: flex; gap: 4px; margin-bottom: 4px; }
  .json-tab { flex: 1; padding: 5px; font-size: 11px; border: 1px solid #e0e0e0; background: #f8f8f8; border-radius: 6px; cursor: pointer; text-align: center; color: #888; }
  .json-tab.active { background: #eef2ff; color: #4f7ef8; border-color: #4f7ef8; font-weight: 600; }
  .json-box { background: #f8f8f8; border: 1px solid #e8e8e8; border-radius: 8px; padding: 8px 10px; font-size: 10px; font-family: monospace; color: #444; max-height: 120px; overflow-y: auto; white-space: pre; line-height: 1.5; }
  .btn-save { border: none; background: #4f7ef8; color: #fff; border-radius: 8px; padding: 9px; font-size: 13px; font-weight: 500; cursor: pointer; width: 100%; }
  .btn-save:hover { background: #3a6ae0; }
  .btn-save.saved { background: #27ae60; }
  .btn-clear { border: 1px solid #e8e8e8; background: #fff; color: #888; border-radius: 8px; padding: 7px; font-size: 12px; cursor: pointer; width: 100%; }
  .btn-clear:hover { border-color: #e74c3c; color: #e74c3c; }
  input[type="file"] { display: none; }
  .tooltip { position: absolute; background: rgba(0,0,0,0.75); color: #fff; font-size: 11px; padding: 4px 8px; border-radius: 4px; pointer-events: none; white-space: nowrap; z-index: 100; transform: translate(-50%, -110%); display: none; }
  .dot { display: inline-block; width: 8px; height: 8px; background: #FFD247; border-radius: 50%; margin-right: 4px; }
</style>
</head>
<body>

<header>
  <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
    <rect x="3" y="2" width="14" height="16" rx="2" fill="#eef2ff" stroke="#4f7ef8" stroke-width="1.2"/>
    <path d="M6 7h8M6 10h8M6 13h5" stroke="#4f7ef8" stroke-width="1.2" stroke-linecap="round"/>
  </svg>
  <h1>Coordenadas de firma en PDF</h1>
  <span>Clic en el PDF para fijar firmas</span>
  <div class="wt-badge">✓ WeeTrust · 595.98 × 842.52</div>
</header>

<div class="main">
  <div class="pdf-area" id="pdfArea">
    <label for="fileInput" style="width:100%;max-width:600px;">
      <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 15V3M12 3L8 7M12 3L16 7" stroke="#4f7ef8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 17v2a2 2 0 002 2h14a2 2 0 002-2v-2" stroke="#4f7ef8" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <p>Selecciona o arrastra tu PDF aquí</p>
        <small>Solo archivos .pdf</small>
      </div>
    </label>
    <input type="file" id="fileInput" accept=".pdf"/>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      Firmas agregadas
      <span class="sig-count" id="sigCount">0</span>
    </div>

    <div class="wt-info">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" stroke="#388e3c" stroke-width="1.2"/><path d="M8 7v4M8 5v1" stroke="#388e3c" stroke-width="1.5" stroke-linecap="round"/></svg>
      Espacio de coordenadas WeeTrust (595.98 × 842.52 pt)
    </div>

    <div class="config-panel">
      <div class="config-row">
        <label><span class="dot"></span>Firmante</label>
        <select id="firmanteSelect">
          <option value="">-- Selecciona --</option>
          <option value="c@efektiva.mx|Arrendador">Arrendador</option>
          <option value="f@efektiva.mx|Arrendatario">Arrendatario</option>
          <option value="b@efektiva.mx|Mancomunado">Mancomunado</option>
          <option value="j@efektiva.mx|Obligado">Obligado</option>
          <option value="a@efektiva.mx|Depositario">Depositario</option>
          <option value="p@efektiva.mx|Testigo 1">Testigo 1</option>
          <option value="g@efektiva.mx|Testigo 2">Testigo 2</option>
          <option value="m@efektiva.mx|SharedWith">SharedWith</option>
        </select>
      </div>
      <div class="config-row">
        <label>Biométrico</label>
        <select id="identSelect">
          <option value="">-- Selecciona --</option>
          <option value="face">Sí (face)</option>
          <option value="null">No (null)</option>
        </select>
      </div>
      <div class="config-row">
        <label>ID oficial</label>
        <div class="check-row">
          <input type="checkbox" id="checkInput"/>
          <span>Requiere ID oficial</span>
        </div>
      </div>
    </div>

    <div class="sig-list" id="sigList">
      <div class="empty-state">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none"><rect x="6" y="4" width="20" height="24" rx="3" stroke="#aaa" stroke-width="1.5"/><path d="M11 12h10M11 16h10M11 20h6" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/></svg>
        <p style="margin-top:6px;">Carga un PDF y haz<br/>clic donde va la firma</p>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="json-tabs">
        <div class="json-tab active" onclick="showTab('coords')">Coordenadas</div>
        <div class="json-tab" onclick="showTab('signatory')">Signatory</div>
      </div>
      <div class="json-box" id="jsonBox">{ }</div>
      <button class="btn-save" id="btnSave" onclick="saveJSON()">Fijar firmas</button>
      <button class="btn-clear" onclick="clearAll()">Limpiar todo</button>
    </div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

// Dimensiones fijas WeeTrust — igual que pdf-coordinates.weetrust.mx
const WT_WIDTH  = 595.98;
const WT_HEIGHT = 842.52;

let pdfDoc      = null;
let currentPage = 1;
let totalPages  = 0;
let signatures  = [];
let renderTask  = null;
let scale       = 1.5;
let activeTab   = 'coords';

const fileInput  = document.getElementById('fileInput');
const pdfArea    = document.getElementById('pdfArea');
const uploadZone = document.querySelector('label[for="fileInput"]');

fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (file && file.type === 'application/pdf') loadPDF(file);
});
uploadZone.addEventListener('dragover', e => {
  e.preventDefault();
  uploadZone.querySelector('.upload-zone').style.borderColor = '#4f7ef8';
});
uploadZone.addEventListener('dragleave', () => {
  uploadZone.querySelector('.upload-zone').style.borderColor = '#ccc';
});
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.querySelector('.upload-zone').style.borderColor = '#ccc';
  const file = e.dataTransfer.files[0];
  if (file && file.type === 'application/pdf') loadPDF(file);
});

async function loadPDF(file) {
  const arrayBuffer = await file.arrayBuffer();
  pdfDoc      = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  totalPages  = pdfDoc.numPages;
  currentPage = 1;
  signatures  = [];
  renderPage(currentPage);
  updateSidebar();
}

async function renderPage(num) {
  if (renderTask) { try { renderTask.cancel(); } catch(e){} }
  const page     = await pdfDoc.getPage(num);
  const viewport = page.getViewport({ scale });

  let wrap = document.getElementById('canvasWrap');
  if (!wrap) {
    pdfArea.innerHTML = '';
    wrap = document.createElement('div');
    wrap.id = 'canvasWrap';
    wrap.className = 'canvas-wrap';
    const pageCtrl = document.createElement('div');
    pageCtrl.className = 'page-controls';
    pageCtrl.id = 'pageCtrl';
    pdfArea.appendChild(pageCtrl);
    pdfArea.appendChild(wrap);
    const tooltip = document.createElement('div');
    tooltip.className = 'tooltip';
    tooltip.id = 'tooltip';
    wrap.appendChild(tooltip);
  }

  let canvas = document.getElementById('pdfCanvas');
  if (!canvas) {
    canvas = document.createElement('canvas');
    canvas.id = 'pdfCanvas';
    wrap.insertBefore(canvas, wrap.firstChild);
  }

  canvas.width  = viewport.width;
  canvas.height = viewport.height;
  wrap.style.width = viewport.width + 'px';

  const ctx = canvas.getContext('2d');
  renderTask = page.render({ canvasContext: ctx, viewport });
  await renderTask.promise;

  canvas.onclick      = (e) => addSignature(e, canvas);
  canvas.onmousemove  = (e) => showTooltip(e, canvas);
  canvas.onmouseleave = ()  => { document.getElementById('tooltip').style.display = 'none'; };

  drawMarkers(wrap);
  updatePageControls(num, totalPages);
}

function showTooltip(e, canvas) {
  const rect = canvas.getBoundingClientRect();
  const x = Math.round(((e.clientX - rect.left) / rect.width)  * WT_WIDTH  * 100) / 100;
  const y = Math.round(((e.clientY - rect.top)  / rect.height) * WT_HEIGHT * 100) / 100;
  const tip = document.getElementById('tooltip');
  tip.style.display = 'block';
  tip.style.left = (e.clientX - rect.left) + 'px';
  tip.style.top  = (e.clientY - rect.top)  + 'px';
  tip.textContent = `x: ${x}  y: ${y}`;
}

function addSignature(e, canvas) {
  const firmanteVal = document.getElementById('firmanteSelect').value;
  if (!firmanteVal) { alert('Selecciona un firmante primero'); return; }
  const identVal = document.getElementById('identSelect').value;
  if (!identVal)  { alert('Selecciona el tipo de identificación'); return; }

  const rect = canvas.getBoundingClientRect();
  const xPx  = e.clientX - rect.left;
  const yPx  = e.clientY - rect.top;

  // Coordenadas en espacio WeeTrust fijo
  const x = Math.round(((xPx / rect.width)  * WT_WIDTH)  * 100) / 100;
  const y = Math.round(((yPx / rect.height) * WT_HEIGHT) * 100) / 100;

  const [email, name] = firmanteVal.split('|');
  const check = document.getElementById('checkInput').checked;
  const order = signatures.length + 1;

  signatures.push({ id: Date.now(), email, name, page: currentPage, x, y, xPx, yPx, identification: identVal, order, check });

  document.getElementById('firmanteSelect').value = '';
  document.getElementById('identSelect').value    = '';
  document.getElementById('checkInput').checked   = false;

  drawMarkers(document.getElementById('canvasWrap'));
  updateSidebar();
}

function drawMarkers(wrap) {
  wrap.querySelectorAll('.marker, .marker-label').forEach(el => el.remove());
  signatures.filter(s => s.page === currentPage).forEach(s => {
    const label = document.createElement('div');
    label.className = 'marker-label';
    label.style.left = s.xPx + 'px';
    label.style.top  = s.yPx + 'px';
    label.textContent = s.name;
    wrap.appendChild(label);

    const marker = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    marker.setAttribute('viewBox', '0 0 28 28');
    marker.classList.add('marker');
    marker.style.left = s.xPx + 'px';
    marker.style.top  = s.yPx + 'px';
    marker.innerHTML  = '<path d="M14 2C9.6 2 6 5.6 6 10c0 6 8 16 8 16s8-10 8-16c0-4.4-3.6-8-8-8z" fill="#FFD247" stroke="#fff" stroke-width="1.5"/><circle cx="14" cy="10" r="3" fill="#fff"/>';
    wrap.appendChild(marker);
  });
}

function updatePageControls(current, total) {
  const ctrl = document.getElementById('pageCtrl');
  ctrl.innerHTML =
    '<button onclick="changePage(-1)"' + (current <= 1 ? ' disabled' : '') + '>&#8592;</button>' +
    '<span>P&aacute;gina <strong>' + current + '</strong> de ' + total + '</span>' +
    '<button onclick="changePage(1)"' + (current >= total ? ' disabled' : '') + '>&#8594;</button>';
}

function changePage(dir) {
  const next = currentPage + dir;
  if (next < 1 || next > totalPages) return;
  currentPage = next;
  renderPage(currentPage);
}

function buildCoordsJSON() {
  return {
    documentID: "6836193e997c07002afdc638",
    staticSignPositions: signatures.map(s => ({
      user:            { email: s.email },
      coordinates:     { x: s.x, y: s.y },
      page:            s.page,
      pageY:           s.y,
      pageYv2:         s.y,
      color:           "#FFD247",
      imageSize:       { width: 101, height: 51 },
      parentImageSize: { width: WT_WIDTH, height: WT_HEIGHT },
      viewport:        { width: WT_WIDTH, height: WT_HEIGHT }
    }))
  };
}

function buildSignatoryJSON() {
  const seen = {}, signatory = [], sharedWith = [];
  signatures.forEach(s => {
    if (s.email === 'm@efektiva.mx') {
      if (!seen['sw_' + s.email]) { seen['sw_' + s.email] = true; sharedWith.push({ emailID: s.email }); }
    } else {
      if (!seen[s.email]) {
        seen[s.email] = true;
        signatory.push({ emailID: s.email, name: s.name, identification: s.identification === 'null' ? null : s.identification, check: s.check, order: s.order });
      }
    }
  });
  if (sharedWith.length === 0) sharedWith.push({ emailID: "m@gmail.com" });
  return { documentID: "6836193e997c07002afdc638", nickname: "Representante legal", message: "Firma tu contrato", title: "Tu contrato esta listo", hasOrder: false, disableMailing: false, signatory, sharedWith };
}

function showTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.json-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'coords') || (i === 1 && tab === 'signatory'));
  });
  updateJsonBox();
}

function updateJsonBox() {
  const b = document.getElementById('jsonBox');
  if (signatures.length === 0) { b.textContent = '{ }'; return; }
  b.textContent = activeTab === 'coords' ? JSON.stringify(buildCoordsJSON(), null, 2) : JSON.stringify(buildSignatoryJSON(), null, 2);
}

function updateSidebar() {
  const list = document.getElementById('sigList');
  document.getElementById('sigCount').textContent = signatures.length;
  if (signatures.length === 0) {
    list.innerHTML = '<div class="empty-state"><svg width="28" height="28" viewBox="0 0 32 32" fill="none"><rect x="6" y="4" width="20" height="24" rx="3" stroke="#aaa" stroke-width="1.5"/><path d="M11 12h10M11 16h10M11 20h6" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/></svg><p style="margin-top:6px;">Carga un PDF y haz<br/>clic donde va la firma</p></div>';
  } else {
    list.innerHTML = signatures.map((s, i) =>
      '<div class="sig-item"><div class="sig-num">' + (i+1) + '</div><div class="sig-data"><div class="sig-name">' + s.name + '</div><div class="sig-coords">P&aacute;g. ' + s.page + ' | x: ' + s.x + ' y: ' + s.y + '</div><div class="sig-meta">biom&eacute;trico: ' + (s.identification === 'null' ? 'no' : 'sí') + ' &middot; ID oficial: ' + (s.check ? 'sí' : 'no') + ' &middot; orden: ' + s.order + '</div></div><button class="sig-del" onclick="removeSig(' + s.id + ')">&#215;</button></div>'
    ).join('');
  }
  updateJsonBox();
}

function removeSig(id) {
  signatures = signatures.filter(s => s.id !== id);
  const wrap = document.getElementById('canvasWrap');
  if (wrap) drawMarkers(wrap);
  updateSidebar();
}

function clearAll() {
  signatures = [];
  const wrap = document.getElementById('canvasWrap');
  if (wrap) drawMarkers(wrap);
  updateSidebar();
}

function saveJSON() {
  if (signatures.length === 0) return;
  window.parent.postMessage({ type: 'coordenadas', data: JSON.stringify(buildCoordsJSON()), signatory: JSON.stringify(buildSignatoryJSON()) }, '*');
  const btn = document.getElementById('btnSave');
  btn.textContent = '¡Guardado!';
  btn.classList.add('saved');
  setTimeout(() => { btn.textContent = 'Fijar firmas'; btn.classList.remove('saved'); }, 2000);
}
</script>
</body>
</html>
